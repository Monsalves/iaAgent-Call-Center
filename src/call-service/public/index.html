<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Campañas de llamadas</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#08111f;color:#e8eef8}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#17345b 0,#08111f 45%)}main{width:min(1100px,calc(100% - 32px));margin:auto;padding:40px 0 80px}header{display:flex;justify-content:space-between;gap:24px;align-items:end;margin-bottom:28px}h1{margin:0;font-size:clamp(28px,5vw,48px);letter-spacing:-.04em}h2{margin:0 0 18px;font-size:20px}p{color:#9fb0c7;margin:8px 0 0}.grid{display:grid;grid-template-columns:340px 1fr;gap:20px}.card{background:rgba(16,29,48,.92);border:1px solid #263b58;border-radius:18px;padding:20px;box-shadow:0 16px 50px #0005}label{display:block;color:#aebed2;font-size:13px;margin:14px 0 7px}input,textarea{width:100%;border:1px solid #344a68;border-radius:10px;background:#0a1728;color:#fff;padding:11px 12px}textarea{min-height:92px;resize:vertical}button{border:0;border-radius:10px;background:#2f7df4;color:white;font-weight:700;padding:10px 14px;cursor:pointer}button:hover{filter:brightness(1.12)}button.secondary{background:#283c58}button.warning{background:#d88418}button.success{background:#16875d}button:disabled{opacity:.45;cursor:not-allowed}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:15px}#message{min-height:22px;margin:14px 0;font-size:14px;color:#8fc2ff}.campaigns{display:grid;gap:12px}.campaign{background:#0b192b;border:1px solid #263c59;border-radius:14px;padding:16px}.campaign-top{display:flex;justify-content:space-between;gap:12px}.campaign h3{margin:0;font-size:17px}.meta{color:#91a4bd;font-size:13px;margin-top:7px;overflow-wrap:anywhere}.badge{align-self:start;padding:5px 9px;border-radius:999px;background:#263c59;font-size:12px;font-weight:700}.badge.running{background:#126746}.badge.paused{background:#8b5714}.badge.completed{background:#344158}.empty{text-align:center;padding:50px 16px;color:#91a4bd}@media(max-width:780px){.grid{grid-template-columns:1fr}header{align-items:start;flex-direction:column}}
  </style>
</head>
<body><main>
  <header><div><h1>Campañas</h1><p>Control simple para campañas salientes con IA.</p></div><button class="secondary" id="refresh">Actualizar</button></header>
  <div class="grid"><aside class="card">
    <h2>Acceso</h2><label for="token">Token administrativo</label><input id="token" type="password" autocomplete="off" placeholder="Bearer token"><p>Se guarda únicamente en esta pestaña.</p>
    <hr style="border:0;border-top:1px solid #263b58;margin:22px 0"><h2>Nueva campaña</h2>
    <label for="name">Nombre</label><input id="name" placeholder="Ej. Confirmación de citas"><label for="prompt">Objetivo o instrucciones</label><textarea id="prompt" placeholder="Confirma la asistencia y registra la respuesta."></textarea><label for="csv">Contactos CSV</label><input id="csv" type="file" accept=".csv,text/csv"><div class="actions"><button id="create">Crear y cargar</button></div><div id="message" role="status"></div>
  </aside><section class="card"><h2>Campañas disponibles</h2><div id="campaigns" class="campaigns"><div class="empty">Ingresa el token para consultar campañas.</div></div></section></div>
</main><script>
const $=id=>document.getElementById(id),token=$("token"),message=$("message"),container=$("campaigns");token.value=sessionStorage.getItem("campaign-token")||"";token.addEventListener("input",()=>sessionStorage.setItem("campaign-token",token.value.trim()));
async function api(path,options={}){const headers=new Headers(options.headers||{});if(!token.value.trim())throw new Error("Ingresa el token administrativo.");headers.set("Authorization",`Bearer ${token.value.trim()}`);const response=await fetch(path,{...options,headers});const body=await response.json().catch(()=>({}));if(!response.ok)throw new Error(body.error||`Error HTTP ${response.status}`);return body}
function actionButton(label,className,enabled,handler){const button=document.createElement("button");button.textContent=label;button.className=className;button.disabled=!enabled;button.addEventListener("click",handler);return button}
async function changeState(id,action){try{message.textContent=`Procesando ${action}…`;await api(`/api/campaigns/${id}/${action}`,{method:"POST"});await loadCampaigns();message.textContent="Operación completada."}catch(error){message.textContent=error.message}}
async function loadCampaigns(){try{const{campaigns=[]}=await api("/api/campaigns");container.replaceChildren();if(!campaigns.length){container.innerHTML='<div class="empty">No hay campañas creadas.</div>';return}for(const campaign of campaigns){const card=document.createElement("article");card.className="campaign";const top=document.createElement("div");top.className="campaign-top";const title=document.createElement("h3");title.textContent=campaign.name;const badge=document.createElement("span");badge.className=`badge ${campaign.status}`;badge.textContent=campaign.status;top.append(title,badge);const meta=document.createElement("div");meta.className="meta";const summary=campaign.summary||{};meta.textContent=`${summary.total||0} contactos · ID ${campaign.id}`;const actions=document.createElement("div");actions.className="actions";actions.append(actionButton("Iniciar","success",["ready","error"].includes(campaign.status),()=>changeState(campaign.id,"start")),actionButton("Pausar","warning",campaign.status==="running",()=>changeState(campaign.id,"pause")),actionButton("Reanudar","success",campaign.status==="paused",()=>changeState(campaign.id,"resume")));card.append(top,meta,actions);container.append(card)}}catch(error){container.innerHTML='<div class="empty"></div>';container.firstChild.textContent=error.message}}
$("create").addEventListener("click",async()=>{try{const file=$("csv").files[0];if(!$("name").value.trim())throw new Error("Escribe un nombre.");if(!file)throw new Error("Selecciona el CSV.");message.textContent="Creando campaña…";const created=await api("/api/campaigns",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:$("name").value.trim(),prompt:$("prompt").value.trim()})});await api(`/api/campaigns/${created.campaign.id}/contacts/csv`,{method:"POST",headers:{"Content-Type":"text/csv"},body:await file.text()});message.textContent="Campaña creada y contactos cargados.";$("name").value="";$("prompt").value="";$("csv").value="";await loadCampaigns()}catch(error){message.textContent=error.message}});$("refresh").addEventListener("click",loadCampaigns);if(token.value)loadCampaigns();
</script></body></html>
