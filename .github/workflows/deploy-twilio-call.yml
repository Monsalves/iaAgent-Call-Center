name: Deploy Twilio Call

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sources
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Bootstrap Ubuntu VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive

            sudo apt-get update
            sudo apt-get install -y ca-certificates curl docker.io docker-compose nginx certbot python3-certbot-nginx

            if ! command -v node >/dev/null 2>&1 || [ "$(node --version | cut -d. -f1)" != "v22" ]; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            sudo systemctl enable --now docker
            sudo systemctl enable --now nginx
            sudo mkdir -p "${{ vars.DEPLOY_PATH || '/srv/azure-realtime-voice-apps/current' }}"
            sudo chown -R "${{ vars.DEPLOY_USER }}":"${{ vars.DEPLOY_USER }}" /srv/azure-realtime-voice-apps

      - name: Sync project to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          source: "src,infra,docs,package.json,package-lock.json,README.md,.gitignore"
          target: ${{ vars.DEPLOY_PATH || '/srv/azure-realtime-voice-apps/current' }}

      - name: Write runtime env on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            sudo tee /etc/twilio-call.env >/dev/null <<'EOF'
            TWILIO_CALL_HOST=127.0.0.1
            TWILIO_CALL_PORT=8090
            PUBLIC_BASE_URL=${{ vars.PUBLIC_BASE_URL }}
            TWILIO_CALL_TRIGGER_TOKEN=${{ secrets.TWILIO_CALL_TRIGGER_TOKEN }}
            AZURE_OPENAI_ENDPOINT=${{ vars.AZURE_OPENAI_ENDPOINT }}
            AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
            AZURE_OPENAI_DEPLOYMENT_NAME=${{ vars.AZURE_OPENAI_DEPLOYMENT_NAME }}
            TWILIO_ACCOUNT_SID=${{ vars.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_FROM_NUMBER=${{ vars.TWILIO_FROM_NUMBER }}
            MAX_CALL_ATTEMPTS=2
            SHORT_CALL_THRESHOLD_SECONDS=8
            CALL_STATUS_POLL_INTERVAL_MS=5000
            CALL_STATUS_TIMEOUT_MS=300000
            EOF
            sudo chmod 600 /etc/twilio-call.env

      - name: Restart service on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH || '/srv/azure-realtime-voice-apps/current' }}"
            npm ci --omit=dev

            if docker compose version >/dev/null 2>&1; then
              sudo docker compose -f infra/redis-compose.yml up -d
            else
              sudo docker-compose -f infra/redis-compose.yml up -d
            fi

            sudo cp infra/systemd/twilio-call.service /etc/systemd/system/twilio-call.service
            sudo sed -i -e "s/^User=.*/User=${{ vars.DEPLOY_USER }}/" -e "s/^Group=.*/Group=${{ vars.DEPLOY_USER }}/" /etc/systemd/system/twilio-call.service
            sudo systemctl daemon-reload
            sudo systemctl enable twilio-call.service
            sudo systemctl restart twilio-call.service
            sleep 2
            curl -f http://127.0.0.1:8090/health

      - name: Configure HTTPS reverse proxy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            public_host="${{ vars.PUBLIC_BASE_URL }}"
            public_host="${public_host#https://}"
            public_host="${public_host#http://}"
            public_host="${public_host%/}"

            if [ ! -f "/etc/letsencrypt/live/${public_host}/fullchain.pem" ]; then
              sudo certbot certonly --nginx --non-interactive --agree-tos \
                --register-unsafely-without-email -d "${public_host}"
            fi

            sudo tee /etc/nginx/sites-available/twilio-call >/dev/null <<EOF
            server {
                listen 80;
                server_name ${public_host};
                return 301 https://\$host\$request_uri;
            }

            server {
                listen 443 ssl;
                server_name ${public_host};
                ssl_certificate /etc/letsencrypt/live/${public_host}/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/${public_host}/privkey.pem;
                client_max_body_size 2m;

                location / {
                    proxy_pass http://127.0.0.1:8090;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 3600s;
                }
            }
            EOF

            sudo ln -sfn /etc/nginx/sites-available/twilio-call /etc/nginx/sites-enabled/twilio-call
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl reload nginx
            curl -f --resolve "${public_host}:443:127.0.0.1" "https://${public_host}/health"
