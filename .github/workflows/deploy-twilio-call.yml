name: Deploy Twilio Call

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check sources
        run: npm run check

      - name: Sync project to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          source: "src,infra,docs,package.json,package-lock.json,README.md,.gitignore"
          target: ${{ vars.DEPLOY_PATH || '/srv/azure-realtime-voice-apps/current' }}

      - name: Write runtime env on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            sudo tee /etc/twilio-call.env >/dev/null <<'EOF'
            TWILIO_CALL_HOST=127.0.0.1
            TWILIO_CALL_PORT=8090
            PUBLIC_BASE_URL=${{ vars.PUBLIC_BASE_URL }}
            TWILIO_CALL_TRIGGER_TOKEN=${{ secrets.TWILIO_CALL_TRIGGER_TOKEN }}
            AZURE_OPENAI_ENDPOINT=${{ vars.AZURE_OPENAI_ENDPOINT }}
            AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
            AZURE_OPENAI_DEPLOYMENT_NAME=${{ vars.AZURE_OPENAI_DEPLOYMENT_NAME }}
            TWILIO_ACCOUNT_SID=${{ vars.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_FROM_NUMBER=${{ vars.TWILIO_FROM_NUMBER }}
            EOF
            sudo chmod 600 /etc/twilio-call.env

      - name: Restart service on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH || '/srv/azure-realtime-voice-apps/current' }}"
            npm ci --omit=dev
            docker compose -f infra/redis-compose.yml up -d
            sudo systemctl restart twilio-call.service
            sleep 2
            curl -f http://127.0.0.1:8090/health
